<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ChineseLearn Pro - 学中文赚大钱{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header { text-align: center; padding: 40px 0 20px; color: white; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1rem; }
        
        /* Cards */
        .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        
        /* Buttons */
        .btn { display: inline-block; padding: 14px 28px; border-radius: 12px; text-decoration: none; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; width: 100%; font-size: 1.1rem; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-vip { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        
        /* Quiz */
        .question-card { text-align: center; }
        .question-english { font-size: 1.5rem; color: #333; margin-bottom: 30px; font-weight: 500; }
        
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 16px 20px; border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer; transition: all 0.3s; text-align: left; font-size: 1rem; }
        .option:hover { border-color: #667eea; background: #f8f9ff; }
        .option.selected { border-color: #667eea; background: #667eea; color: white; }
        .option.correct { border-color: #4CAF50; background: #4CAF50; color: white; }
        .option.wrong { border-color: #f44336; background: #f44336; color: white; }
        
        /* User info */
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; }
        .user-name { font-weight: 600; color: #333; }
        .vip-badge { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        
        /* Stats */
        .stats { display: flex; justify-content: space-around; text-align: center; margin: 20px 0; }
        .stat-item h3 { font-size: 2rem; color: #667eea; }
        .stat-item p { color: #666; font-size: 0.9rem; }
        
        /* Footer */
        .footer { text-align: center; padding: 20px; color: white; opacity: 0.7; }
        .footer a { color: white; }
        
        /* Login */
        .login-methods { display: flex; flex-direction: column; gap: 12px; }
        .login-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; border-radius: 12px; text-decoration: none; color: #333; background: white; border: 2px solid #e0e0e0; font-weight: 500; }
        .login-btn:hover { border-color: #667eea; }
        
        /* VIP Page */
        .vip-plans { display: flex; flex-direction: column; gap: 16px; }
        .vip-plan { display: flex; justify-content: space-between; align-items: center; padding: 20px; border: 2px solid #e0e0e0; border-radius: 12px; }
        .vip-plan.recommended { border-color: #f5576c; position: relative; }
        .vip-plan.recommended::before { content: '推荐'; position: absolute; top: -12px; right: 20px; background: #f5576c; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        .plan-price { font-size: 1.8rem; font-weight: bold; color: #f5576c; }
        .plan-name { font-size: 1.2rem; font-weight: 600; }
        
        /* Messages */
        .message { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; }
        .message.error { background: #ffebee; color: #c62828; }
        .message.success { background: #e8f5e9; color: #2e7d32; }
        
        /* Free trial */
        .trial-info { background: #fff8e1; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 16px; color: #f57c00; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    
    <div class="footer">
        <p>&copy; 2026 ChineseLearn Pro | <a href="#">关于我们</a> | <a href="#">联系客服</a></p>
    </div>
</body>
</html>
