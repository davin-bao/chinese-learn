{% extends "base.html" %}

{% block title %}登录 - ChineseLearn Pro{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
{% endblock %}

{% block content %}
<div class="container">
    <div class="header">
        <h1>欢迎回来</h1>
        <p>登录开始学习</p>
    </div>
    
    <div class="card">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; color: #666;">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" style="width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1rem;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; color: #666;">密码</label>
            <input type="password" id="password" placeholder="请输入密码" style="width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1rem;">
        </div>
        
        <button onclick="doLogin()" class="btn btn-primary">登录</button>
        
        <p style="text-align: center; margin-top: 16px; color: #666;">
            没有账号？<a href="/register" style="color: #667eea;">立即注册</a>
        </p>
        
        <p style="text-align: center; margin-top: 10px;">
            <a href="/" style="color: #666;">返回首页</a>
        </p>
    </div>
</div>

<script>
async function doLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    if (!username || !password) {
        alert('请填写用户名和密码');
        return;
    }
    
    try {
        const response = await axios.post('/login', { username, password });
        if (response.data.status === 'ok') {
            window.location.href = '/';
        }
    } catch (error) {
        alert(error.response?.data?.error || '登录失败');
    }
}
</script>
{% endblock %}
