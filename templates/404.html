<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在 | ChineseLearn Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .error-container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: white;
            line-height: 1;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .error-code span {
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        .error-code span:nth-child(2) {
            animation-delay: 0.5s;
        }
        .error-code span:nth-child(3) {
            animation-delay: 1s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .error-message {
            font-size: 1.5rem;
            color: white;
            margin: 20px 0 10px;
        }
        .error-desc {
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            font-size: 1rem;
        }
        .error-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: white;
            color: #667eea;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }
        
        /* 搜索框 */
        .search-box {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .search-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        /* 可能需要的页面 */
        .suggestions {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            margin-top: 30px;
        }
        .suggestions h3 {
            color: white;
            margin-bottom: 16px;
            font-size: 1rem;
        }
        .suggestion-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .suggestion-link {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .suggestion-link:hover {
            background: white;
            color: #667eea;
        }
        
        /* 装饰 */
        .decoration {
            position: absolute;
            font-size: 2rem;
            opacity: 0.3;
        }
        .decoration-1 { top: 10%; left: 10%; animation: spin 10s linear infinite; }
        .decoration-2 { top: 20%; right: 15%; animation: spin 15s linear infinite reverse; }
        .decoration-3 { bottom: 15%; left: 20%; animation: spin 12s linear infinite; }
        .decoration-4 { bottom: 25%; right: 10%; animation: spin 8s linear infinite reverse; }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 装饰元素 -->
    <div class="decoration decoration-1">🔍</div>
    <div class="decoration decoration-2">🤔</div>
    <div class="decoration decoration-3">📚</div>
    <div class="decoration decoration-4">💡</div>
    
    <div class="error-container">
        <div class="error-code">
            <span>4</span>
            <span>0</span>
            <span>4</span>
        </div>
        
        <h1 class="error-message">页面未找到</h1>
        <p class="error-desc">抱歉，你访问的页面不存在或已搬家</p>
        
        <div class="error-actions">
            <a href="/" class="btn btn-primary">🏠 返回首页</a>
            <a href="javascript:history.back()" class="btn btn-secondary">← 返回上页</a>
        </div>
        
        <div class="suggestions">
            <h3>你可以试试</h3>
            <div class="suggestion-links">
                <a href="/" class="suggestion-link">🏠 首页</a>
                <a href="/courses" class="suggestion-link">📚 课程</a>
                <a href="/learn" class="suggestion-link">📖 学习</a>
                <a href="/vocabulary" class="suggestion-link">📝 词汇</a>
                <a href="/vip" class="suggestion-link">💎 VIP</a>
                <a href="/profile" class="suggestion-link">👤 个人资料</a>
            </div>
        </div>
    </div>
</body>
</html>
